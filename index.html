<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Pro - Doações PIX</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, 
                        dark: '#0f172a' 
                    } 
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #editor-container { height: calc(100vh - 250px); border-radius: 0 0 1rem 1rem; }
        .ql-toolbar { border-radius: 1rem 1rem 0 0 !important; background: #f8fafc; }
        #jsmind_container { width: 100%; height: calc(100vh - 250px); background-color: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; }
        
        .donation-card.active { border-color: #0ea5e9; background-color: #f0f9ff; transform: translateY(-5px); }

        @media print {
            aside, header, .no-print, .view-section:not(.active-print) { display: none !important; }
            #main-app, main { display: block !important; }
        }
    </style>
</head>
<body class="bg-slate-50">

    <div id="main-app" class="hidden min-h-screen">
        <aside class="w-72 bg-dark text-slate-300 p-6 flex flex-col shadow-xl z-10 no-print">
            <div class="flex items-center gap-3 mb-10 px-2">
                <i class="fa-solid fa-layer-group text-brand-500 text-3xl"></i>
                <span class="text-2xl font-bold text-white tracking-tight">NoteHub</span>
            </div>
            <nav class="flex-grow space-y-3">
                <button id="nav-dashboard" onclick="showView('dashboard')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-medium text-left transition-all">
                    <i class="fa-solid fa-house-chimney w-5"></i> Meu Hub
                </button>
                <button id="nav-donations" onclick="showView('donations')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-medium text-left transition-all">
                    <i class="fa-solid fa-heart text-red-400 w-5"></i> Apoiar Projeto
                </button>
            </nav>
            <div class="mt-auto p-4 bg-slate-800/50 rounded-2xl flex items-center gap-3 border border-slate-700/50">
                <img id="user-photo" class="h-10 w-10 rounded-full border-2 border-slate-600">
                <div class="flex-1 overflow-hidden">
                    <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                    <button onclick="logout()" class="text-xs text-red-400 font-semibold">Sair</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b border-slate-200 p-6 flex items-center justify-between no-print">
                <h2 id="header-title" class="text-2xl font-bold text-slate-800">Meu Hub</h2>
            </header>

            <div class="flex-1 p-8 overflow-y-auto">
                
                <div id="view-dashboard" class="view-section block max-w-6xl mx-auto">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <button onclick="createNewProject('text')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2.5rem] hover:border-brand-500 transition-all group">
                            <div class="w-14 h-14 bg-brand-50 text-brand-500 rounded-2xl flex items-center justify-center mb-4"><i class="fa-solid fa-plus text-xl"></i></div>
                            <h3 class="text-xl font-bold">Novo Texto</h3>
                        </button>
                        <button onclick="createNewProject('map')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2.5rem] hover:border-purple-500 transition-all group">
                            <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center mb-4"><i class="fa-solid fa-diagram-project text-xl"></i></div>
                            <h3 class="text-xl font-bold">Novo Mapa Mental</h3>
                        </button>
                    </div>
                    <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <div id="view-text-editor" class="view-section hidden flex-col h-full max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6 gap-4">
                        <input type="text" id="text-title" placeholder="Título..." class="bg-transparent text-3xl font-bold outline-none flex-1">
                        <div class="flex gap-2">
                            <button onclick="window.print()" class="bg-slate-200 p-3 rounded-xl"><i class="fa-solid fa-print"></i></button>
                            <button onclick="saveProject('text')" class="bg-brand-500 text-white px-6 py-3 rounded-xl font-bold">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-100 px-4 py-3 rounded-xl font-bold">Voltar</button>
                        </div>
                    </div>
                    <div id="editor-container" class="bg-white shadow-sm border border-slate-200"></div>
                </div>

                <div id="view-donations" class="view-section hidden flex-col max-w-4xl mx-auto text-center">
                    <div class="bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100">
                        <div class="w-20 h-20 bg-red-50 text-red-500 rounded-3xl flex items-center justify-center mx-auto mb-6">
                            <i class="fa-solid fa-heart text-3xl"></i>
                        </div>
                        <h2 class="text-3xl font-black text-slate-800 mb-2">Apoie o NoteHub</h2>
                        <p class="text-slate-500 mb-10">Sua contribuição ajuda a manter o servidor ativo e novas funções sendo criadas!</p>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <button onclick="selectVal(5, this)" class="donation-card p-6 border-2 border-slate-100 rounded-3xl transition-all font-bold text-slate-700 hover:border-brand-500">R$ 5</button>
                            <button onclick="selectVal(10, this)" class="donation-card p-6 border-2 border-slate-100 rounded-3xl transition-all font-bold text-slate-700 hover:border-brand-500">R$ 10</button>
                            <button onclick="selectVal(50, this)" class="donation-card p-6 border-2 border-slate-100 rounded-3xl transition-all font-bold text-slate-700 hover:border-brand-500">R$ 50</button>
                            <input type="number" id="custom-val" placeholder="Outro" class="p-6 border-2 border-slate-100 rounded-3xl outline-none focus:border-brand-500 font-bold text-center">
                        </div>

                        <button id="btn-generate-pix" onclick="generatePix()" class="w-full bg-dark text-white py-5 rounded-2xl font-bold text-xl hover:bg-brand-600 transition-all flex items-center justify-center gap-3">
                            <i class="fa-solid fa-qrcode"></i> Gerar PIX
                        </button>

                        <div id="pix-result" class="hidden mt-10 p-8 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
                            <p class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">Escaneie o QR Code</p>
                            <img id="pix-qr" class="mx-auto w-48 h-48 mb-6 shadow-lg rounded-xl">
                            <div class="relative">
                                <input type="text" id="pix-code" readonly class="w-full bg-white border border-slate-200 p-4 rounded-xl text-xs font-mono pr-24">
                                <button onclick="copyPix()" class="absolute right-2 top-2 bg-brand-500 text-white px-4 py-2 rounded-lg text-sm font-bold">Copiar</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center bg-slate-100">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-md w-full">
            <i class="fa-solid fa-layer-group text-brand-500 text-6xl mb-6"></i>
            <h1 class="text-3xl font-black mb-8">NoteHub Pro</h1>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-dark text-white px-6 py-4 rounded-2xl font-bold hover:bg-brand-600 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 bg-white rounded-full p-1"> Entrar com Google
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl text-white font-medium"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, deleteDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Globais para as funções abaixo
        window.db = db; window.auth = auth;
        window.collection = collection; window.addDoc = addDoc; window.getDocs = getDocs; window.query = query; window.where = where; window.doc = doc; window.updateDoc = updateDoc; window.getDoc = getDoc; window.serverTimestamp = serverTimestamp;

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                loadProjects();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>

    <script>
        let selectedValue = 0;
        const MP_TOKEN = "APP_USR-2926870035529230-021119-799834c980f71cd5170b27170e1ec829-314166223";

        function showView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById('header-title').innerText = view === 'dashboard' ? 'Meu Hub' : 'Apoiar Projeto';
        }

        function selectVal(val, btn) {
            selectedValue = val;
            document.getElementById('custom-val').value = '';
            document.querySelectorAll('.donation-card').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generatePix() {
            const custom = document.getElementById('custom-val').value;
            const finalValue = custom ? parseFloat(custom) : selectedValue;

            if(!finalValue || finalValue < 1) return showToast("Valor mínimo R$ 1,00", "error");

            const btn = document.getElementById('btn-generate-pix');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Gerando...';
            btn.disabled = true;

            const paymentData = {
                transaction_amount: finalValue,
                description: `Doação NoteHub - de ${window.currentUser.displayName}`,
                payment_method_id: "pix",
                payer: {
                    email: window.currentUser.email,
                    first_name: window.currentUser.displayName.split(' ')[0],
                }
            };

            try {
                const response = await fetch("https://api.mercadopago.com/v1/payments", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${MP_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(paymentData)
                });

                const data = await response.json();

                if(data.point_of_interaction) {
                    const qrCodeBase64 = data.point_of_interaction.transaction_data.qr_code_base64;
                    const qrCodeCopyPaste = data.point_of_interaction.transaction_data.qr_code;

                    document.getElementById('pix-qr').src = `data:image/jpeg;base64,${qrCodeBase64}`;
                    document.getElementById('pix-code').value = qrCodeCopyPaste;
                    document.getElementById('pix-result').classList.remove('hidden');
                    showToast("PIX Gerado com sucesso!");
                } else {
                    throw new Error();
                }
            } catch (err) {
                showToast("Erro ao gerar PIX. Verifique sua chave.", "error");
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-qrcode"></i> Gerar PIX';
                btn.disabled = false;
            }
        }

        function copyPix() {
            const input = document.getElementById('pix-code');
            input.select();
            document.execCommand('copy');
            showToast("Código Copiado!");
        }

        function showToast(m, t='success') {
            const el = document.getElementById('toast');
            el.innerHTML = m; el.className = `fixed bottom-4 right-4 z-50 px-6 py-3 rounded-xl shadow-xl text-white font-bold transition-all ${t === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            el.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => el.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        // Funções de salvamento (Mantidas do código anterior)
        async function loadProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '';
            const q = window.query(window.collection(window.db, "projects"), window.where("userId", "==", window.currentUser.uid));
            const snap = await window.getDocs(q);
            snap.forEach(d => {
                const p = d.data();
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2rem] border border-slate-200 hover:shadow-lg cursor-pointer";
                card.innerHTML = `<h4 class="font-bold">${p.title}</h4><p class="text-xs text-slate-400 mt-2">${p.type === 'text' ? 'Documento' : 'Mapa Mental'}</p>`;
                card.onclick = () => openProject(d.id, p.type);
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
