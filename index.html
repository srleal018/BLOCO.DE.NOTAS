<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Pro - Seu Segundo Cérebro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, 
                        dark: '#0f172a' 
                    } 
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #editor-container { height: calc(100vh - 250px); font-size: 16px; border-radius: 0 0 1rem 1rem; }
        .ql-toolbar { border-radius: 1rem 1rem 0 0 !important; background: #f8fafc; border-color: #e2e8f0 !important; }
        
        #jsmind_container { 
            width: 100%; height: calc(100vh - 250px); 
            background-color: #f8fafc;
            border-radius: 1rem; 
            border: 1px solid #e2e8f0;
        }

        /* ESTILO DE IMPRESSÃO - ESCONDE O QUE NÃO INTERESSA */
        @media print {
            aside, header, .flex.gap-2, .bg-white.p-2.rounded-2xl, button, .ql-toolbar {
                display: none !important;
            }
            main { p: 0 !important; margin: 0 !important; }
            .view-section { display: block !important; }
            #editor-container, #jsmind_container { 
                border: none !important; 
                height: auto !important; 
                width: 100% !important;
            }
            body { background: white; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c",
            measurementId: "G-SKDH1JR99T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.db = db; window.auth = auth;
        window.collection = collection; window.addDoc = addDoc; window.getDocs = getDocs;
        window.doc = doc; window.updateDoc = updateDoc; window.deleteDoc = deleteDoc;
        window.query = query; window.where = where; window.serverTimestamp = serverTimestamp;

        window.loginGoogle = () => { signInWithPopup(auth, provider); };
        window.logout = () => { signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                loadProjects();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</head>
<body class="bg-slate-50">

    <div id="main-app" class="hidden min-h-screen">
        <aside class="w-72 bg-dark text-slate-300 p-6 flex flex-col shadow-xl">
            <div class="flex items-center gap-3 mb-12 px-2">
                <i class="fa-solid fa-layer-group text-brand-500 text-3xl"></i>
                <span class="text-2xl font-bold text-white tracking-tight">NoteHub</span>
            </div>
            <nav class="flex-grow space-y-2">
                <button onclick="showView('dashboard')" class="w-full flex items-center gap-4 bg-slate-800 text-white px-4 py-3.5 rounded-2xl font-medium text-left">
                    <i class="fa-solid fa-house-chimney w-5"></i> Meu Hub
                </button>
            </nav>
            <div class="mt-auto p-4 bg-slate-800/50 rounded-2xl flex items-center gap-3">
                <img id="user-photo" class="h-10 w-10 rounded-full">
                <div class="flex-1 overflow-hidden">
                    <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                    <button onclick="logout()" class="text-xs text-red-400 font-semibold">Sair</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b p-6 flex items-center justify-between">
                <h2 id="header-title" class="text-2xl font-bold text-slate-800">Meu Hub</h2>
            </header>

            <div class="flex-1 p-8 overflow-y-auto">
                
                <div id="view-dashboard" class="view-section block max-w-6xl mx-auto">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <button onclick="createNewProject('text')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-brand-500 text-left transition-all">
                            <div class="w-12 h-12 bg-brand-50 text-brand-500 rounded-xl flex items-center justify-center mb-4"><i class="fa-solid fa-plus"></i></div>
                            <h3 class="text-xl font-bold">Novo Texto</h3>
                        </button>
                        <button onclick="createNewProject('map')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-purple-500 text-left transition-all">
                            <div class="w-12 h-12 bg-purple-50 text-purple-500 rounded-xl flex items-center justify-center mb-4"><i class="fa-solid fa-diagram-project"></i></div>
                            <h3 class="text-xl font-bold">Novo Mapa Mental</h3>
                        </button>
                    </div>
                    <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <div id="view-text-editor" class="view-section hidden flex-col h-full max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6 gap-4">
                        <input type="text" id="text-title" placeholder="Título" class="bg-transparent text-3xl font-bold outline-none flex-1">
                        <div class="flex gap-2">
                            <button onclick="window.print()" class="bg-slate-100 p-2 px-4 rounded-xl hover:bg-slate-200" title="Imprimir"><i class="fa-solid fa-print"></i></button>
                            <button onclick="saveProject('text')" class="bg-brand-500 text-white px-6 py-2 rounded-xl font-bold">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-200 px-6 py-2 rounded-xl font-bold">Voltar</button>
                        </div>
                    </div>
                    <div id="editor-container" class="bg-white"></div>
                </div>

                <div id="view-map-editor" class="view-section hidden flex-col h-full">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                        <input type="text" id="map-title" placeholder="Título do Mapa" class="bg-transparent text-3xl font-bold outline-none flex-1">
                        <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border">
                            <button onclick="window.print()" class="p-2 hover:bg-slate-100 rounded-lg"><i class="fa-solid fa-print"></i></button>
                            <div class="w-px h-6 bg-slate-200 mx-2"></div>
                            <button onclick="addMapNode()" class="bg-dark text-white px-4 py-2 rounded-xl text-sm font-bold"> + Nó</button>
                            <button onclick="saveProject('map')" class="bg-brand-500 text-white px-6 py-2 rounded-xl font-bold">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-200 px-4 py-2 rounded-xl font-bold">Sair</button>
                        </div>
                    </div>
                    <div id="jsmind_container"></div>
                </div>

            </div>
        </main>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-md w-full border">
            <i class="fa-solid fa-layer-group text-brand-500 text-6xl mb-6"></i>
            <h1 class="text-3xl font-black mb-2">NoteHub Pro</h1>
            <p class="text-slate-500 mb-8">Faça login para começar a criar.</p>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-slate-900 text-white px-6 py-4 rounded-2xl font-bold hover:bg-brand-600 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 bg-white rounded-full p-1"> Entrar com Google
            </button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>

    <script>
        let currentProjectId = null;
        let jm = null;
        const quill = new Quill('#editor-container', { theme: 'snow', placeholder: 'Comece a escrever...' });

        function showView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if(view !== 'dashboard') document.getElementById(`view-${view}`).classList.add('flex');
            document.getElementById('header-title').innerText = view === 'dashboard' ? 'Meu Hub' : 'Editando Projeto';
        }

        async function loadProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '<div class="col-span-full text-center p-10"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-brand-500"></i></div>';
            
            try {
                // Removido o orderBy para evitar erro de índice no Firebase
                const q = window.query(
                    window.collection(window.db, "projects"), 
                    window.where("userId", "==", window.currentUser.uid)
                );
                const snap = await window.getDocs(q);
                grid.innerHTML = '';

                if (snap.empty) {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-400">Nenhum projeto ainda.</p>';
                    return;
                }

                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-[2rem] border hover:shadow-xl transition-all cursor-pointer group relative";
                    card.innerHTML = `
                        <div onclick="openProject('${docSnap.id}', '${p.type}')">
                            <div class="w-10 h-10 ${p.type === 'text' ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'} rounded-xl flex items-center justify-center mb-4">
                                <i class="fa-solid ${p.type === 'text' ? 'fa-file-lines' : 'fa-diagram-project'}"></i>
                            </div>
                            <h4 class="font-bold text-slate-800 truncate pr-8">${p.title}</h4>
                            <p class="text-xs text-slate-400 mt-2 uppercase font-bold tracking-widest">${p.type}</p>
                        </div>
                        <button onclick="deleteSavedProject('${docSnap.id}')" class="absolute top-6 right-6 text-slate-300 hover:text-red-500"><i class="fa-solid fa-trash"></i></button>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { 
                grid.innerHTML = '<p class="text-red-500">Erro ao carregar. Verifique o console.</p>';
                console.error(e); 
            }
        }

        async function saveProject(type) {
            const title = document.getElementById(type === 'text' ? 'text-title' : 'map-title').value;
            const content = type === 'text' ? quill.root.innerHTML : JSON.stringify(jm.get_data());

            if (!title.trim()) return alert("Dê um título!");

            const data = {
                title, content, type,
                userId: window.currentUser.uid,
                updatedAt: window.serverTimestamp()
            };

            try {
                if (currentProjectId) {
                    await window.updateDoc(window.doc(window.db, "projects", currentProjectId), data);
                } else {
                    const docRef = await window.addDoc(window.collection(window.db, "projects"), data);
                    currentProjectId = docRef.id;
                }
                alert("Salvo!");
                loadProjects();
            } catch (e) { alert("Erro ao salvar!"); }
        }

        async function openProject(id, type) {
            currentProjectId = id;
            const q = window.query(window.collection(window.db, "projects"));
            const snap = await window.getDocs(q);
            const p = snap.docs.find(d => d.id === id).data();

            if (type === 'text') {
                document.getElementById('text-title').value = p.title;
                quill.root.innerHTML = p.content;
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = p.title;
                initJsMind(JSON.parse(p.content));
                showView('map-editor');
            }
        }

        async function deleteSavedProject(id) {
            if (confirm("Excluir projeto?")) {
                await window.deleteDoc(window.doc(window.db, "projects", id));
                loadProjects();
            }
        }

        function createNewProject(type) {
            currentProjectId = null;
            if (type === 'text') {
                document.getElementById('text-title').value = '';
                quill.root.innerHTML = '';
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = '';
                initJsMind(null);
                showView('map-editor');
            }
        }

        function initJsMind(data) {
            const mind = data || { "meta": { "name": "novo" }, "format": "node_array", "data": [{ "id": "root", "isroot": true, "topic": "Ideia Central" }] };
            if (jm) { jm.show(mind); }
            else { jm = jsMind.show({ container: 'jsmind_container', editable: true, theme: 'primary' }, mind); }
        }

        function addMapNode() {
            const selected = jm.get_selected_node();
            if (selected) jm.add_node(selected, jsMind.util.uuid.newid(), 'Novo Tópico');
            else alert("Selecione um tópico primeiro!");
        }
    </script>
</body>
</html>
