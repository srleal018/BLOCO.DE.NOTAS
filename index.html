<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Pro - Sistema Completo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, dark: '#0f172a' } }
            }
        }
    </script>
    
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #editor-container { height: 60vh; font-size: 16px; }
        #jsmind_container { width: 100%; height: 60vh; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 0.5rem; }

        /* REGRAS DE IMPRESSÃO */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            main { margin: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; }
            #editor-container { border: none !important; height: auto !important; }
            .ql-toolbar { display: none !important; }
            .view-section { border: none !important; box-shadow: none !important; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c",
            measurementId: "G-SKDH1JR99T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.currentUser = null;
        window.db = db;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.deleteDoc = deleteDoc;
        window.query = query;
        window.where = where;
        window.serverTimestamp = serverTimestamp;
        window.currentProjectId = null;

        window.loginGoogle = () => { signInWithPopup(auth, provider).catch(error => showModal("Erro no Login", error.message)); };
        window.logout = () => { signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                showView('dashboard');
                loadProjects();
            } else {
                window.currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('main-app').classList.remove('flex');
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <div id="custom-context-menu" class="hidden fixed z-[100] bg-white border border-slate-200 shadow-xl rounded-lg w-40 overflow-hidden text-sm">
        <button onclick="handleContextAction('edit')" class="w-full text-left px-4 py-2 hover:bg-slate-50 transition flex items-center gap-2">
            <i class="fa-solid fa-pen text-slate-400"></i> Editar/Renomear
        </button>
        <button onclick="handleContextAction('delete')" class="w-full text-left px-4 py-2 hover:bg-slate-50 text-red-600 transition flex items-center gap-2">
            <i class="fa-solid fa-trash text-red-400"></i> Excluir
        </button>
        <div class="h-px bg-slate-100"></div>
        <button onclick="handleContextAction('move')" class="w-full text-left px-4 py-2 hover:bg-slate-50 transition flex items-center gap-2">
            <i class="fa-solid fa-arrows-up-down-left-right text-slate-400"></i> Mover
        </button>
    </div>

    <div id="custom-modal" class="hidden no-print fixed inset-0 bg-black/50 z-50 flex items-center justify-center transition-opacity">
        <div class="bg-white rounded-2xl p-6 w-96 shadow-2xl transform scale-100 transition-transform">
            <h3 id="modal-title" class="text-xl font-bold mb-2 text-slate-800">Título</h3>
            <p id="modal-message" class="text-slate-600 mb-6 text-sm">Mensagem do modal.</p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel" class="hidden px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-xl font-medium transition">Cancelar</button>
                <button id="modal-confirm" class="bg-brand-500 text-white px-5 py-2 rounded-xl font-medium shadow hover:bg-brand-600 transition">OK</button>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="flex items-center justify-center min-h-screen bg-white">
        <div class="text-center p-8">
            <h1 class="text-4xl font-extrabold text-dark mb-4">Note<span class="text-brand-500">Hub</span> Pro</h1>
            <button onclick="loginGoogle()" class="bg-brand-500 text-white px-8 py-4 rounded-xl shadow hover:bg-brand-600 transition-all font-medium">Entrar com Google</button>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen flex-row">
        
        <aside class="no-print w-64 bg-dark text-slate-200 p-6 flex flex-col shadow-xl z-10">
            <div class="flex items-center gap-3 mb-10">
                <i class="fa-solid fa-note-sticky text-brand-500 text-2xl"></i>
                <span class="text-2xl font-bold text-white">NoteHub</span>
            </div>
            <nav class="space-y-2 flex-grow">
                <button onclick="showView('dashboard')" class="w-full flex items-center gap-3 bg-brand-600 text-white px-4 py-3 rounded-lg font-medium transition-all text-left hover:bg-brand-500">
                    <i class="fa-solid fa-house w-5 text-center"></i> Meu Hub
                </button>
                <button onclick="createNewProject('text')" class="w-full flex items-center gap-3 text-slate-400 hover:text-white px-4 py-3 rounded-lg transition-all hover:bg-slate-800 text-left">
                    <i class="fa-solid fa-plus w-5 text-center"></i> Novo Texto
                </button>
                <button onclick="createNewProject('map')" class="w-full flex items-center gap-3 text-slate-400 hover:text-white px-4 py-3 rounded-lg transition-all hover:bg-slate-800 text-left">
                    <i class="fa-solid fa-plus w-5 text-center"></i> Novo Mapa
                </button>
            </nav>
            <div class="border-t border-slate-700 pt-6 mt-6 flex items-center gap-3">
                <img id="user-photo" src="" alt="Avatar" class="h-10 w-10 rounded-full border-2 border-brand-500">
                <div>
                    <div id="user-name" class="font-medium text-white truncate w-32 text-sm">Usuário</div>
                    <button onclick="logout()" class="text-xs text-slate-400 hover:text-red-400 transition-all">Sair</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-slate-50 flex flex-col h-screen overflow-hidden">
            <header class="no-print bg-white border-b border-slate-200 p-4 flex items-center justify-between shadow-sm">
                <h2 id="header-title" class="text-2xl font-bold text-slate-800">Meu Hub</h2>
            </header>

            <div class="flex-1 p-8 overflow-y-auto">
                <div id="view-dashboard" class="view-section block no-print">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Meus Projetos</h3>
                        <button onclick="loadProjects()" class="text-brand-500 hover:text-brand-700"><i class="fa-solid fa-rotate-right"></i> Atualizar</button>
                    </div>
                    <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                </div>

                <div id="view-text-editor" class="view-section hidden flex-col h-full bg-white rounded-xl shadow p-4 border border-slate-200">
                    <div class="no-print flex justify-between items-center mb-4">
                        <input type="text" id="text-title" placeholder="Título da Nota" class="text-2xl font-bold outline-none text-slate-800 w-full">
                        <div class="flex gap-2">
                            <button onclick="window.print()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium hover:bg-slate-300 transition" title="Imprimir"><i class="fa-solid fa-print"></i></button>
                            <button onclick="deleteCurrentProject('text')" id="btn-del-text" class="hidden bg-red-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-red-600 transition">Excluir</button>
                            <button onclick="saveProject('text')" class="bg-green-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-green-600 transition"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
                        </div>
                    </div>
                    <div id="editor-container"></div>
                </div>

                <div id="view-map-editor" class="view-section hidden flex-col h-full bg-white rounded-xl shadow p-4 border border-slate-200">
                    <div class="no-print flex justify-between items-center mb-4">
                        <input type="text" id="map-title" placeholder="Título do Mapa" class="text-2xl font-bold outline-none text-slate-800 w-full">
                        <div class="flex gap-2">
                            <button onclick="addMapNode()" class="bg-blue-500 text-white px-3 py-2 rounded-lg text-sm hover:bg-blue-600 transition"><i class="fa-solid fa-plus"></i> Nó</button>
                            <button onclick="window.print()" class="bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium hover:bg-slate-300 transition" title="Imprimir"><i class="fa-solid fa-print"></i></button>
                            <button onclick="deleteCurrentProject('map')" id="btn-del-map" class="hidden bg-red-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-red-600 transition">Excluir</button>
                            <button onclick="saveProject('map')" class="bg-green-500 text-white px-4 py-2 rounded-lg font-medium hover:bg-green-600 transition"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
                        </div>
                    </div>
                    <div id="jsmind_container"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>

    <script>
        // --- SISTEMA DE POP-UP (MODAL) ---
        function showModal(title, message, isConfirm = false, onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            const modal = document.getElementById('custom-modal');
            const btnCancel = document.getElementById('modal-cancel');
            const btnConfirm = document.getElementById('modal-confirm');
            modal.classList.remove('hidden');
            btnConfirm.onclick = null; btnCancel.onclick = null;
            if (isConfirm) {
                btnCancel.classList.remove('hidden');
                btnCancel.onclick = () => modal.classList.add('hidden');
                btnConfirm.onclick = () => { modal.classList.add('hidden'); if(onConfirm) onConfirm(); };
            } else {
                btnCancel.classList.add('hidden');
                btnConfirm.onclick = () => modal.classList.add('hidden');
            }
        }

        // --- MENU DE CONTEXTO ---
        const contextMenu = document.getElementById('custom-context-menu');
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            contextMenu.style.top = `${e.pageY}px`;
            contextMenu.style.left = `${e.pageX}px`;
            contextMenu.classList.remove('hidden');
        });
        document.addEventListener('click', () => contextMenu.classList.add('hidden'));

        function handleContextAction(action) {
            if (action === 'delete') {
                if (jm && jm.get_selected_node()) {
                    const node = jm.get_selected_node();
                    if(node.isroot) return showModal("Erro", "Não é possível excluir o nó raiz.");
                    jm.remove_node(node);
                } else {
                    if (window.currentProjectId) deleteCurrentProject();
                }
            } else if (action === 'edit') {
                if (jm && jm.get_selected_node()) jm.begin_edit(jm.get_selected_node());
                else showModal("Aviso", "Edite o título diretamente no campo superior.");
            } else if (action === 'move') {
                showModal("Info", "No Mapa Mental, arraste o nó para mover. No Editor de Texto, selecione e arraste.");
            }
            contextMenu.classList.add('hidden');
        }

        // --- NAVEGAÇÃO E LÓGICA DE PROJETOS ---
        function showView(viewName) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            const headerTitle = document.getElementById('header-title');
            if (viewName === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden');
                headerTitle.innerText = "Meu Hub de Projetos";
            } else if (viewName === 'text-editor') {
                document.getElementById('view-text-editor').classList.remove('hidden');
                document.getElementById('view-text-editor').classList.add('flex');
                headerTitle.innerText = window.currentProjectId ? "Editando Texto" : "Novo Texto";
            } else if (viewName === 'map-editor') {
                document.getElementById('view-map-editor').classList.remove('hidden');
                document.getElementById('view-map-editor').classList.add('flex');
                headerTitle.innerText = window.currentProjectId ? "Editando Mapa Mental" : "Novo Mapa Mental";
            }
        }

        function createNewProject(type) {
            window.currentProjectId = null;
            if (type === 'text') {
                document.getElementById('text-title').value = '';
                quill.root.innerHTML = '';
                document.getElementById('btn-del-text').classList.add('hidden');
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = '';
                initJsMind(null);
                document.getElementById('btn-del-map').classList.add('hidden');
                showView('map-editor');
            }
        }

        async function saveProject(type) {
            if(!window.currentUser) return showModal("Erro", "Você não está autenticado.");
            let title = type === 'text' ? document.getElementById('text-title').value : document.getElementById('map-title').value;
            let content = type === 'text' ? quill.root.innerHTML : JSON.stringify(jm.get_data());
            try {
                if(window.currentProjectId) {
                    await window.updateDoc(window.doc(window.db, "projects", window.currentProjectId), { title, content, updatedAt: window.serverTimestamp() });
                    showModal("Sucesso!", "Projeto atualizado.");
                } else {
                    const docRef = await window.addDoc(window.collection(window.db, "projects"), { userId: window.currentUser.uid, type, title, content, createdAt: window.serverTimestamp() });
                    window.currentProjectId = docRef.id;
                    document.getElementById(`btn-del-${type}`).classList.remove('hidden');
                    showModal("Sucesso!", "Projeto salvo!");
                }
                loadProjects();
            } catch (error) { showModal("Erro", error.message); }
        }

        async function loadProjects() {
            if(!window.currentUser) return;
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '<p class="text-slate-500">Carregando...</p>';
            try {
                const q = window.query(window.collection(window.db, "projects"), window.where("userId", "==", window.currentUser.uid));
                const querySnapshot = await window.getDocs(q);
                grid.innerHTML = '';
                if(querySnapshot.empty) { grid.innerHTML = '<p class="text-slate-500">Nenhum projeto encontrado.</p>'; return; }
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const safeData = encodeURIComponent(JSON.stringify({ id: docSnap.id, ...data }));
                    grid.innerHTML += `
                        <div onclick="openProject('${safeData}')" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-lg transition-all cursor-pointer h-40">
                            <span class="text-xs font-medium text-${data.type === 'text' ? 'blue' : 'purple'}-700">${data.type === 'text' ? 'Texto' : 'Mapa Mental'}</span>
                            <h4 class="font-semibold text-lg mt-2 truncate">${data.title}</h4>
                        </div>`;
                });
            } catch (error) { grid.innerHTML = `<p class="text-red-500">Erro: ${error.message}</p>`; }
        }

        function openProject(encodedData) {
            const data = JSON.parse(decodeURIComponent(encodedData));
            window.currentProjectId = data.id;
            if (data.type === 'text') {
                document.getElementById('text-title').value = data.title;
                quill.root.innerHTML = data.content;
                document.getElementById('btn-del-text').classList.remove('hidden');
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = data.title;
                initJsMind(JSON.parse(data.content));
                document.getElementById('btn-del-map').classList.remove('hidden');
                showView('map-editor');
            }
        }

        function deleteCurrentProject() {
            showModal("Atenção", "Tem certeza que deseja excluir?", true, async () => {
                try {
                    await window.deleteDoc(window.doc(window.db, "projects", window.currentProjectId));
                    window.currentProjectId = null;
                    showModal("Excluído", "Projeto removido.");
                    loadProjects();
                    showView('dashboard');
                } catch(error) { showModal("Erro", error.message); }
            });
        }

        // --- INICIALIZAR EDITORES ---
        var quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [ [{ 'font': [] }, { 'size': [] }], ['bold', 'italic', 'underline'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['clean'] ] } });
        var jm = null;
        function initJsMind(data) {
            var mind = data || { "meta": { "name": "novo", "author": "voce", "version": "1.0" }, "format": "node_array", "data": [ {"id":"root", "isroot":true, "topic":"Ideia Central"} ] };
            var options = { container: 'jsmind_container', editable: true, theme: 'primary' };
            if(jm) { jm.show(mind); } else { jm = jsMind.show(options, mind); }
        }
        function addMapNode() {
            if(!jm) return;
            var selected_node = jm.get_selected_node();
            if(!selected_node) return showModal("Aviso", "Selecione um nó primeiro.");
            jm.add_node(selected_node, jsMind.util.uuid.newid(), '* Novo Tópico *');
        }
    </script>
</body>
</html>
