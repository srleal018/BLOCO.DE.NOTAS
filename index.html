<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Pro - Seu Segundo Cérebro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, 
                        dark: '#0f172a' 
                    } 
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Ajustes UI Editor e Mapa */
        #editor-container { height: calc(100vh - 250px); font-size: 16px; border-radius: 0 0 1rem 1rem; }
        .ql-toolbar { border-radius: 1rem 1rem 0 0 !important; background: #f8fafc; border-color: #e2e8f0 !important; }
        
        #jsmind_container { 
            width: 100%; height: calc(100vh - 250px); 
            background-color: #f8fafc;
            border-radius: 1rem; 
            border: 1px solid #e2e8f0;
            overflow: auto;
        }

        /* Scrollbar customizada para o Chat */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* REGRAS DE IMPRESSÃO - Sem URL e cabeçalhos do navegador */
        @media print {
            /* Remove a URL, data e título padrão do navegador */
            @page { margin: 0; } 
            
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

            /* Esconde toda a interface desnecessária */
            aside, header, button, .ql-toolbar, #toast, #confirm-modal, .flex.gap-2, .bg-white.p-2.rounded-2xl, #view-dashboard, #view-chat {
                display: none !important;
            }
            
            #main-app { display: block !important; height: auto !important; }
            main { padding: 0 !important; margin: 0 !important; height: auto !important; overflow: visible !important; border: none !important; }
            .flex-1.p-8.overflow-y-auto { overflow: visible !important; padding: 0 !important; }
            .view-section { display: block !important; max-width: 100% !important; margin: 0 !important; }
            
            /* Margem interna do documento para não cortar nas bordas do papel */
            body { background: white !important; padding: 2cm !important; }
            
            /* Impressão de Texto: Título e Descrição apenas */
            #text-title { display: none !important; } 
            #print-text-title { display: block !important; font-size: 24pt !important; margin-bottom: 20px !important; border-bottom: 2px solid #ccc; padding-bottom: 10px;} 
            #editor-container { border: none !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .ql-editor { padding: 0 !important; font-size: 14pt !important; color: black !important; overflow: visible !important; height: auto !important; }
            
            /* Impressão de Mapa: Tópicos e Cores apenas */
            .print-map { padding: 1cm !important; }
            .print-map #map-title { display: none !important; } 
            #jsmind_container { 
                border: none !important; 
                box-shadow: none !important; 
                height: auto !important; 
                width: 100% !important; 
                overflow: visible !important;
                background: transparent !important;
            }
            
            img { max-width: 100% !important; height: auto !important; page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-slate-50 relative">

    <div id="main-app" class="hidden min-h-screen">
        <aside class="w-72 bg-dark text-slate-300 p-6 flex flex-col shadow-xl z-10">
            <div class="flex items-center gap-3 mb-10 px-2">
                <i class="fa-solid fa-layer-group text-brand-500 text-3xl"></i>
                <span class="text-2xl font-bold text-white tracking-tight">NoteHub</span>
            </div>
            <nav class="flex-grow space-y-3">
                <button id="nav-dashboard" onclick="showView('dashboard')" class="nav-btn w-full flex items-center gap-4 bg-brand-600 text-white px-4 py-3.5 rounded-2xl font-medium text-left transition-all hover:bg-brand-500 shadow-md">
                    <i class="fa-solid fa-house-chimney w-5"></i> Meu Hub
                </button>
                <button id="nav-chat" onclick="showView('chat')" class="nav-btn w-full flex items-center gap-4 bg-transparent text-slate-400 hover:text-white hover:bg-slate-800 px-4 py-3.5 rounded-2xl font-medium text-left transition-all">
                    <i class="fa-solid fa-comments w-5"></i> Chat Global
                </button>
            </nav>
            <div class="mt-auto p-4 bg-slate-800/50 rounded-2xl flex items-center gap-3 border border-slate-700/50">
                <img id="user-photo" class="h-10 w-10 rounded-full border-2 border-slate-600">
                <div class="flex-1 overflow-hidden">
                    <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                    <button onclick="logout()" class="text-xs text-red-400 font-semibold hover:text-red-300 transition-colors">Sair da Conta</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
            <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 p-6 flex items-center justify-between sticky top-0 z-10">
                <h2 id="header-title" class="text-2xl font-bold text-slate-800">Meu Hub</h2>
            </header>

            <div class="flex-1 p-8 overflow-y-auto">
                
                <div id="view-dashboard" class="view-section block max-w-6xl mx-auto">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <button onclick="createNewProject('text')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-brand-500 hover:shadow-xl text-left transition-all group duration-300">
                            <div class="w-14 h-14 bg-brand-50 text-brand-500 rounded-2xl flex items-center justify-center mb-4 group-hover:-translate-y-1 transition-transform"><i class="fa-solid fa-file-signature text-xl"></i></div>
                            <h3 class="text-xl font-bold text-slate-800">Novo Texto</h3>
                            <p class="text-slate-500 text-sm mt-1">Crie documentos ricos e anotações.</p>
                        </button>
                        <button onclick="createNewProject('map')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-purple-500 hover:shadow-xl text-left transition-all group duration-300">
                            <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center mb-4 group-hover:-translate-y-1 transition-transform"><i class="fa-solid fa-diagram-project text-xl"></i></div>
                            <h3 class="text-xl font-bold text-slate-800">Novo Mapa Mental</h3>
                            <p class="text-slate-500 text-sm mt-1">Estruture suas ideias visualmente.</p>
                        </button>
                    </div>
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-lg font-bold text-slate-700">Projetos Recentes</h3>
                    </div>
                    <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <div id="view-text-editor" class="view-section hidden flex-col h-full max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <input type="text" id="text-title" placeholder="Título do Documento..." class="bg-transparent text-2xl font-bold outline-none flex-1 text-slate-800 px-2">
                        <div class="flex gap-2">
                            <button onclick="customPrint('text')" class="bg-slate-100 p-2.5 px-4 rounded-xl hover:bg-slate-200 text-slate-700 transition-colors" title="Imprimir"><i class="fa-solid fa-print"></i></button>
                            <button onclick="saveProject('text')" class="bg-brand-500 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-brand-600 transition-colors shadow-md shadow-brand-500/30">Salvar</button>
                        </div>
                    </div>
                    <h1 id="print-text-title" class="hidden text-black"></h1>
                    <div id="editor-container" class="bg-white shadow-sm border border-slate-200"></div>
                </div>

                <div id="view-map-editor" class="view-section hidden flex-col h-full max-w-6xl mx-auto">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <input type="text" id="map-title" placeholder="Título do Mapa..." class="bg-transparent text-2xl font-bold outline-none flex-1 text-slate-800 px-2">
                        <div class="flex items-center gap-2">
                            <button onclick="customPrint('map')" class="bg-slate-100 p-2.5 px-4 rounded-xl hover:bg-slate-200 text-slate-700 transition-colors" title="Imprimir (Paisagem)"><i class="fa-solid fa-print"></i></button>
                            <div class="w-px h-6 bg-slate-200 mx-1"></div>
                            <button onclick="addMapNode()" class="bg-dark text-white px-5 py-2.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition-colors shadow-md"><i class="fa-solid fa-plus mr-2"></i>Tópico</button>
                            <button onclick="saveProject('map')" class="bg-brand-500 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-brand-600 transition-colors shadow-md shadow-brand-500/30">Salvar</button>
                        </div>
                    </div>
                    <div id="jsmind_container" class="shadow-sm"></div>
                </div>

                <div id="view-chat" class="view-section hidden flex-col h-full max-w-4xl mx-auto bg-white rounded-[2rem] shadow-xl border border-slate-100 overflow-hidden" style="max-height: calc(100vh - 160px);">
                    <div class="bg-brand-50 border-b border-brand-100 p-6 flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold text-slate-800"><i class="fa-regular fa-comments text-brand-500 mr-2"></i> Chat Global</h3>
                            <p class="text-sm text-slate-500 mt-1">Converse e troque ideias com outros usuários em tempo real.</p>
                        </div>
                        <div class="flex -space-x-2 overflow-hidden">
                            <span class="relative flex h-3 w-3 mt-1 mr-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span></span>
                        </div>
                    </div>
                    
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-5 bg-slate-50/50 flex flex-col">
                        </div>
                    
                    <div class="p-4 bg-white border-t border-slate-100 flex gap-3 items-center">
                        <input type="text" id="chat-input" onkeypress="if(event.key === 'Enter') sendChatMessage()" placeholder="Digite sua mensagem aqui..." class="flex-1 bg-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-brand-500 focus:bg-white transition-all text-slate-700">
                        <button onclick="sendChatMessage()" class="bg-brand-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center font-bold hover:bg-brand-600 transition-all shadow-lg shadow-brand-500/30 hover:-translate-y-1"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-[128px] opacity-40"></div>
        
        <div class="bg-white/80 backdrop-blur-xl p-12 rounded-[3rem] shadow-2xl text-center max-w-md w-full border border-white relative z-10">
            <div class="w-20 h-20 bg-brand-50 text-brand-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                <i class="fa-solid fa-layer-group text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black mb-3 text-slate-800 tracking-tight">NoteHub <span class="text-brand-500">Pro</span></h1>
            <p class="text-slate-500 mb-10 text-lg">Sua central de ideias e anotações.</p>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-slate-900 text-white px-6 py-4 rounded-2xl font-bold hover:bg-brand-600 transition-all shadow-xl hover:shadow-brand-500/20 hover:-translate-y-1">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-7 h-7 bg-white rounded-full p-1.5"> Entrar com Google
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl text-white font-medium pointer-events-none"></div>

    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center transition-opacity">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full transform scale-95 transition-transform">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h3 class="text-2xl font-bold text-center text-slate-800 mb-2">Excluir Projeto?</h3>
            <p class="text-slate-500 text-center mb-8">Essa ação não pode ser desfeita. Tem certeza que deseja remover este item?</p>
            <div class="flex gap-4">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-100 text-slate-700 px-4 py-3.5 rounded-xl font-bold hover:bg-slate-200 transition-colors">Cancelar</button>
                <button id="confirm-btn" class="flex-1 bg-red-500 text-white px-4 py-3.5 rounded-xl font-bold hover:bg-red-600 transition-colors shadow-lg shadow-red-500/30">Excluir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.draggable.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, deleteDoc, query, where, serverTimestamp, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c",
            measurementId: "G-SKDH1JR99T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Expõe funções para o escopo global
        window.db = db; window.auth = auth;
        window.collection = collection; window.addDoc = addDoc; window.getDocs = getDocs; 
        window.getDoc = getDoc; window.doc = doc; window.updateDoc = updateDoc; 
        window.deleteDoc = deleteDoc; window.query = query; window.where = where; 
        window.serverTimestamp = serverTimestamp; window.onSnapshot = onSnapshot; window.orderBy = orderBy;

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                
                loadProjects();
                initGlobalChat(); // Inicia o chat ao logar
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>

    <script>
        let currentProjectId = null;
        let jm = null;
        let chatUnsubscribe = null;
        
        // Inicializa o Editor Quill
        const quill = new Quill('#editor-container', { 
            theme: 'snow', 
            placeholder: 'Comece a escrever seu gênio...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['image', 'link', 'clean']
                ]
            }
        });

        // Função de Impressão Customizada (Sem URL no topo)
        function customPrint(type) {
            const oldStyle = document.getElementById('print-page-style');
            if(oldStyle) oldStyle.remove();

            const style = document.createElement('style');
            style.id = 'print-page-style';
            
            if(type === 'map') {
                style.innerHTML = `@page { size: landscape; margin: 0; }`;
                document.body.classList.add('print-map');
            } else {
                style.innerHTML = `@page { size: portrait; margin: 0; }`;
                document.body.classList.remove('print-map');
                document.getElementById('print-text-title').innerText = document.getElementById('text-title').value || "Documento Sem Título";
            }
            
            document.head.appendChild(style);
            setTimeout(() => { window.print(); }, 150);
        }

        // Navegação Visual
        function showView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if(view !== 'dashboard') document.getElementById(`view-${view}`).classList.add('flex');
            
            // Textos do header
            const titles = { 'dashboard': 'Meu Hub', 'text-editor': 'Editando Documento', 'map-editor': 'Editando Mapa Mental', 'chat': 'Bate-papo Global' };
            document.getElementById('header-title').innerText = titles[view] || '';

            // Estilos do menu lateral
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-brand-600', 'text-white', 'shadow-md', 'hover:bg-brand-500');
                btn.classList.add('bg-transparent', 'text-slate-400', 'hover:bg-slate-800', 'hover:text-white');
            });
            
            const activeBtn = document.getElementById(`nav-${view === 'dashboard' || view === 'chat' ? view : 'dashboard'}`);
            if(activeBtn) {
                activeBtn.classList.add('bg-brand-600', 'text-white', 'shadow-md', 'hover:bg-brand-500');
                activeBtn.classList.remove('bg-transparent', 'text-slate-400', 'hover:bg-slate-800', 'hover:text-white');
            }

            // Scroll para baixo no chat ao abrir
            if(view === 'chat') {
                const container = document.getElementById('chat-messages');
                container.scrollTop = container.scrollHeight;
            }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-circle' : 'fa-circle-exclamation'} text-xl"></i> ${msg}`;
            toast.className = `fixed bottom-4 right-4 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl text-white font-medium transform transition-all duration-300 ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            setTimeout(() => { toast.classList.remove('translate-y-20', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }

        // ---------- LÓGICA DO CHAT GLOBAL ----------
        function initGlobalChat() {
            if (chatUnsubscribe) return; // Já iniciado

            const messagesRef = window.collection(window.db, "global_chat");
            const q = window.query(messagesRef, window.orderBy("createdAt", "asc"));
            
            chatUnsubscribe = window.onSnapshot(q, (snapshot) => {
                const container = document.getElementById('chat-messages');
                container.innerHTML = '';
                
                if(snapshot.empty) {
                    container.innerHTML = '<div class="text-center text-slate-400 mt-10"><i class="fa-regular fa-comments text-4xl mb-3"></i><p>Nenhuma mensagem ainda. Diga oi!</p></div>';
                    return;
                }

                snapshot.forEach((doc) => {
                    const msg = doc.data();
                    const isMe = msg.userId === window.currentUser.uid;
                    const time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Agora';
                    
                    const div = document.createElement('div');
                    div.className = `flex w-full ${isMe ? 'justify-end' : 'justify-start'}`;
                    
                    div.innerHTML = `
                        <div class="max-w-[75%] ${isMe ? 'bg-brand-500 text-white rounded-t-2xl rounded-bl-2xl' : 'bg-white border border-slate-200 text-slate-800 rounded-t-2xl rounded-br-2xl'} p-4 shadow-sm relative group">
                            ${!isMe ? `<p class="text-xs font-bold text-brand-600 mb-1 flex items-center gap-1"><i class="fa-solid fa-user-astronaut text-[10px]"></i> ${msg.userName}</p>` : ''}
                            <p class="text-sm leading-relaxed">${msg.text}</p>
                            <span class="text-[10px] ${isMe ? 'text-brand-100' : 'text-slate-400'} block text-right mt-2">${time}</span>
                        </div>
                    `;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        window.sendChatMessage = async () => {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text || !window.currentUser) return;
            
            input.value = ''; // limpa imediatamente
            
            await window.addDoc(window.collection(window.db, "global_chat"), {
                text: text,
                userId: window.currentUser.uid,
                userName: window.currentUser.displayName || 'Usuário',
                createdAt: window.serverTimestamp()
            });
        };
        // ------------------------------------------

        async function loadProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '<div class="col-span-full text-center p-10"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-500"></i><p class="text-slate-500 mt-4">Carregando...</p></div>';
            
            const q = window.query(window.collection(window.db, "projects"), window.where("userId", "==", window.currentUser.uid));
            const snap = await window.getDocs(q);
            grid.innerHTML = '';

            if(snap.empty) {
                grid.innerHTML = '<div class="col-span-full text-center p-10 bg-white rounded-3xl border border-dashed border-slate-300"><img src="https://www.svgrepo.com/show/474075/folder-open.svg" class="w-16 h-16 mx-auto mb-4 opacity-50"><p class="text-slate-500 font-medium">Você ainda não tem nenhum projeto salvo.</p></div>';
            }

            snap.forEach(docSnap => {
                const p = docSnap.data();
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2rem] border border-slate-200 hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer relative group flex flex-col h-full";
                card.innerHTML = `
                    <div onclick="openProject('${docSnap.id}', '${p.type}')" class="flex-1">
                        <div class="w-12 h-12 ${p.type === 'text' ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'} rounded-2xl flex items-center justify-center mb-4"><i class="fa-solid ${p.type === 'text' ? 'fa-file-lines' : 'fa-diagram-project'} text-lg"></i></div>
                        <h4 class="font-bold text-slate-800 text-lg truncate pr-8">${p.title}</h4>
                        <p class="text-xs text-slate-400 mt-2 uppercase font-bold tracking-wider">${p.type === 'text' ? 'Documento de Texto' : 'Mapa Mental'}</p>
                    </div>
                    <button onclick="deleteSavedProject('${docSnap.id}')" class="absolute top-6 right-6 w-8 h-8 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center opacity-0 group-hover:opacity-100 hover:bg-red-50 hover:text-red-500 transition-all"><i class="fa-solid fa-trash text-sm"></i></button>
                `;
                grid.appendChild(card);
            });
        }

        async function saveProject(type) {
            const titleInput = document.getElementById(type === 'text' ? 'text-title' : 'map-title');
            const title = titleInput.value;
            const content = type === 'text' ? quill.root.innerHTML : JSON.stringify(jm.get_data());

            if (!title.trim()) return showToast("Por favor, dê um título ao projeto!", "error");

            const btn = event.target;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

            const data = { title, content, type, userId: window.currentUser.uid, updatedAt: window.serverTimestamp() };

            if (currentProjectId) {
                await window.updateDoc(window.doc(window.db, "projects", currentProjectId), data);
            } else {
                const docRef = await window.addDoc(window.collection(window.db, "projects"), data);
                currentProjectId = docRef.id;
            }
            
            btn.innerHTML = originalText;
            showToast("Projeto salvo com sucesso!");
            loadProjects();
        }

        async function openProject(id, type) {
            currentProjectId = id;
            const docSnap = await window.getDoc(window.doc(window.db, "projects", id));
            if (docSnap.exists()) {
                const p = docSnap.data();
                if (type === 'text') {
                    document.getElementById('text-title').value = p.title;
                    quill.root.innerHTML = p.content;
                    showView('text-editor');
                } else {
                    document.getElementById('map-title').value = p.title;
                    initJsMind(JSON.parse(p.content));
                    showView('map-editor');
                }
            }
        }

        function createNewProject(type) {
            currentProjectId = null;
            if (type === 'text') {
                document.getElementById('text-title').value = '';
                quill.root.innerHTML = '';
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = '';
                initJsMind(null);
                showView('map-editor');
            }
        }

        function initJsMind(data) {
            const mind = data || { "meta": { "name": "novo" }, "format": "node_array", "data": [{ "id": "root", "isroot": true, "topic": "Ideia Central" }] };
            const options = { container: 'jsmind_container', editable: true, theme: 'primary' };
            if (jm) { jm.show(mind); } else { jm = jsMind.show(options, mind); }
        }

        function addMapNode() {
            const selected = jm.get_selected_node();
            if (selected) jm.add_node(selected, jsMind.util.uuid.newid(), 'Novo Tópico');
            else showToast("Selecione um nó primeiro para adicionar um tópico.", "error");
        }

        function deleteSavedProject(id) {
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Pequeno delay para a animação
            setTimeout(() => modal.firstElementChild.classList.remove('scale-95'), 10);
            
            document.getElementById('confirm-btn').onclick = async () => {
                await window.deleteDoc(window.doc(window.db, "projects", id));
                closeConfirm();
                loadProjects();
                showToast("Projeto excluído com sucesso!");
            };
        }

        function closeConfirm() { 
            const modal = document.getElementById('confirm-modal');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 150);
        }
    </script>
</body>
</html>
