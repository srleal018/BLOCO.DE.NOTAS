<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Pro - Seu Segundo Cérebro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, 
                        dark: '#0f172a' 
                    } 
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #editor-container { height: calc(100vh - 250px); font-size: 16px; border-radius: 0 0 1rem 1rem; }
        .ql-toolbar { border-radius: 1rem 1rem 0 0 !important; background: #f8fafc; border-color: #e2e8f0 !important; }
        
        #jsmind_container { 
            width: 100%; height: calc(100vh - 250px); 
            background-color: #f8fafc; border-radius: 1rem; border: 1px solid #e2e8f0; overflow: auto;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* REGRAS DE IMPRESSÃO - REMOVE URL E INTERFACE */
        @media print {
            @page { margin: 0; size: auto; } 
            body { background: white !important; padding: 1.5cm !important; margin: 0 !important; }
            aside, header, button, .ql-toolbar, #toast, #confirm-modal, .bg-white.p-2.rounded-2xl, #view-dashboard, #view-chat, .no-print {
                display: none !important;
            }
            #main-app, main, .view-section { display: block !important; height: auto !important; overflow: visible !important; border: none !important; }
            .flex-1.p-8 { padding: 0 !important; overflow: visible !important; }
            #text-title, #map-title { display: none !important; }
            #print-text-title { display: block !important; font-size: 28pt !important; font-weight: 800; margin-bottom: 1cm; border-bottom: 2px solid #000; padding-bottom: 10px; }
            .ql-editor { padding: 0 !important; font-size: 12pt !important; height: auto !important; overflow: visible !important; }
            #jsmind_container { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body class="bg-slate-50">

    <div id="main-app" class="hidden min-h-screen">
        <aside class="w-72 bg-dark text-slate-300 p-6 flex flex-col shadow-xl z-10 no-print">
            <div class="flex items-center gap-3 mb-10 px-2">
                <i class="fa-solid fa-layer-group text-brand-500 text-3xl"></i>
                <span class="text-2xl font-bold text-white tracking-tight">NoteHub</span>
            </div>
            <nav class="flex-grow space-y-3">
                <button id="nav-dashboard" onclick="showView('dashboard')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-medium text-left transition-all">
                    <i class="fa-solid fa-house-chimney w-5"></i> Meu Hub
                </button>
                <button id="nav-chat" onclick="showView('chat')" class="nav-btn w-full flex items-center gap-4 px-4 py-3.5 rounded-2xl font-medium text-left transition-all">
                    <i class="fa-solid fa-comments w-5"></i> Chat Global
                </button>
            </nav>
            <div class="mt-auto p-4 bg-slate-800/50 rounded-2xl flex items-center gap-3 border border-slate-700/50">
                <img id="user-photo" class="h-10 w-10 rounded-full border-2 border-slate-600">
                <div class="flex-1 overflow-hidden">
                    <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                    <button onclick="logout()" class="text-xs text-red-400 font-semibold hover:text-red-300 transition-colors">Sair</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b border-slate-200 p-6 flex items-center justify-between no-print">
                <h2 id="header-title" class="text-2xl font-bold text-slate-800">Meu Hub</h2>
            </header>

            <div class="flex-1 p-8 overflow-y-auto">
                
                <div id="view-dashboard" class="view-section block max-w-6xl mx-auto">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <button onclick="createNewProject('text')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2.5rem] hover:border-brand-500 hover:shadow-xl text-left transition-all group">
                            <div class="w-14 h-14 bg-brand-50 text-brand-500 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i class="fa-solid fa-plus text-xl"></i></div>
                            <h3 class="text-xl font-bold">Novo Texto</h3>
                        </button>
                        <button onclick="createNewProject('map')" class="p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2.5rem] hover:border-purple-500 hover:shadow-xl text-left transition-all group">
                            <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i class="fa-solid fa-diagram-project text-xl"></i></div>
                            <h3 class="text-xl font-bold">Novo Mapa Mental</h3>
                        </button>
                    </div>
                    <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                </div>

                <div id="view-text-editor" class="view-section hidden flex-col h-full max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6 gap-4 no-print">
                        <input type="text" id="text-title" placeholder="Título..." class="bg-transparent text-3xl font-bold outline-none flex-1 text-slate-800">
                        <div class="flex gap-2">
                            <button onclick="customPrint('text')" class="bg-slate-200 p-3 rounded-xl hover:bg-slate-300 text-slate-700 transition-colors"><i class="fa-solid fa-print"></i></button>
                            <button onclick="saveProject('text')" class="bg-brand-500 text-white px-6 py-3 rounded-xl font-bold hover:bg-brand-600">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl font-bold">Voltar</button>
                        </div>
                    </div>
                    <h1 id="print-text-title" class="hidden text-black"></h1>
                    <div id="editor-container" class="bg-white shadow-sm border border-slate-200"></div>
                </div>

                <div id="view-map-editor" class="view-section hidden flex-col h-full">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4 no-print">
                        <input type="text" id="map-title" placeholder="Título do Mapa..." class="bg-transparent text-3xl font-bold outline-none flex-1 text-slate-800">
                        <div class="flex items-center gap-2">
                            <button onclick="customPrint('map')" class="bg-slate-200 p-3 rounded-xl hover:bg-slate-300 text-slate-700" title="Imprimir"><i class="fa-solid fa-print"></i></button>
                            <button onclick="addMapNode()" class="bg-dark text-white px-4 py-3 rounded-xl font-bold"><i class="fa-solid fa-plus"></i></button>
                            <button onclick="saveProject('map')" class="bg-brand-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-100 text-slate-600 px-4 py-3 rounded-xl font-bold">Sair</button>
                        </div>
                    </div>
                    <div id="jsmind_container"></div>
                </div>

                <div id="view-chat" class="view-section hidden flex-col h-[calc(100vh-160px)] max-w-4xl mx-auto bg-white rounded-[2rem] shadow-2xl border border-slate-100 overflow-hidden">
                    <div class="bg-brand-500 p-6 text-white">
                        <h3 class="text-xl font-bold"><i class="fa-solid fa-globe mr-2"></i> Chat Global NoteHub</h3>
                        <p class="text-brand-100 text-sm">Conectado em tempo real</p>
                    </div>
                    <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50 flex flex-col">
                        </div>
                    <div class="p-4 bg-white border-t flex gap-3">
                        <input type="text" id="chat-input" onkeypress="if(event.key === 'Enter') sendChatMessage()" placeholder="Escreva uma mensagem..." class="flex-1 bg-slate-100 rounded-2xl px-6 py-4 outline-none focus:ring-2 focus:ring-brand-500">
                        <button onclick="sendChatMessage()" class="bg-brand-500 text-white w-14 h-14 rounded-2xl flex items-center justify-center hover:bg-brand-600 transition-all"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-4 bg-slate-100">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl text-center max-w-md w-full">
            <i class="fa-solid fa-layer-group text-brand-500 text-6xl mb-6"></i>
            <h1 class="text-3xl font-black mb-2">NoteHub Pro</h1>
            <p class="text-slate-500 mb-8">Onde suas ideias ganham vida.</p>
            <button onclick="loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-dark text-white px-6 py-4 rounded-2xl font-bold hover:bg-brand-600 transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 bg-white rounded-full p-1"> Entrar com Google
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl text-white font-medium"></div>

    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl max-w-sm w-full">
            <h3 class="text-xl font-bold text-center mb-6">Deseja excluir?</h3>
            <div class="flex gap-4">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-100 py-3 rounded-xl font-bold">Não</button>
                <button id="confirm-btn" class="flex-1 bg-red-500 text-white py-3 rounded-xl font-bold">Sim, excluir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.draggable.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, deleteDoc, query, where, serverTimestamp, onSnapshot, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c",
            measurementId: "G-SKDH1JR99T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.db = db; window.auth = auth;
        window.collection = collection; window.addDoc = addDoc; window.getDocs = getDocs; 
        window.getDoc = getDoc; window.doc = doc; window.updateDoc = updateDoc; 
        window.deleteDoc = deleteDoc; window.query = query; window.where = where; 
        window.serverTimestamp = serverTimestamp; window.onSnapshot = onSnapshot; 
        window.orderBy = orderBy; window.limit = limit;

        window.loginGoogle = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                loadProjects();
                initChat();
                showView('dashboard');
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>

    <script>
        let currentProjectId = null;
        let jm = null;
        let chatUnsub = null;
        const quill = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [[{'header':[1,2,false]}],['bold','italic','underline'],[{'list':'ordered'},{'list':'bullet'}],['image','clean']] }});

        function showView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if(view !== 'dashboard') document.getElementById(`view-${view}`).classList.add('flex');
            
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('bg-brand-500', 'text-white', 'shadow-lg');
                b.classList.add('text-slate-400', 'hover:bg-slate-800');
            });
            const active = document.getElementById(`nav-${view === 'chat' ? 'chat' : 'dashboard'}`);
            if(active) active.classList.add('bg-brand-500', 'text-white', 'shadow-lg');
            
            if(view === 'chat') scrollChat();
        }

        function customPrint(type) {
            if(type === 'text') document.getElementById('print-text-title').innerText = document.getElementById('text-title').value || "Sem Título";
            setTimeout(() => window.print(), 200);
        }

        async function initChat() {
            if(chatUnsub) return;
            const q = window.query(window.collection(window.db, "global_chat"), window.orderBy("createdAt", "asc"), window.limit(50));
            chatUnsub = window.onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = '';
                if(snap.empty) box.innerHTML = '<p class="text-center text-slate-400">Nenhuma mensagem. Comece o papo!</p>';
                snap.forEach(d => {
                    const m = d.data();
                    const isMe = m.uid === window.currentUser.uid;
                    const el = document.createElement('div');
                    el.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                    el.innerHTML = `
                        <div class="${isMe ? 'bg-brand-500 text-white rounded-t-xl rounded-bl-xl' : 'bg-white text-slate-800 rounded-t-xl rounded-br-xl'} p-3 shadow-sm max-w-[80%]">
                            ${!isMe ? `<p class="text-[10px] font-bold opacity-70 mb-1">${m.name}</p>` : ''}
                            <p class="text-sm">${m.text}</p>
                        </div>
                    `;
                    box.appendChild(el);
                });
                scrollChat();
            });
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();
            if(!val) return;
            input.value = '';
            await window.addDoc(window.collection(window.db, "global_chat"), {
                text: val, uid: window.currentUser.uid, name: window.currentUser.displayName, createdAt: window.serverTimestamp()
            });
        }

        function scrollChat() { const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight; }

        async function loadProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-10"><i class="fa-solid fa-spinner fa-spin text-2xl"></i></div>';
            const q = window.query(window.collection(window.db, "projects"), window.where("userId", "==", window.currentUser.uid));
            const snap = await window.getDocs(q);
            grid.innerHTML = '';
            snap.forEach(docSnap => {
                const p = docSnap.data();
                const card = document.createElement('div');
                card.className = "bg-white p-6 rounded-[2rem] border border-slate-200 hover:shadow-xl transition-all cursor-pointer relative group";
                card.innerHTML = `
                    <div onclick="openProject('${docSnap.id}', '${p.type}')">
                        <div class="w-10 h-10 ${p.type === 'text' ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'} rounded-xl flex items-center justify-center mb-4"><i class="fa-solid ${p.type === 'text' ? 'fa-file-lines' : 'fa-diagram-project'}"></i></div>
                        <h4 class="font-bold truncate pr-6">${p.title}</h4>
                    </div>
                    <button onclick="deleteSavedProject('${docSnap.id}')" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100"><i class="fa-solid fa-trash"></i></button>
                `;
                grid.appendChild(card);
            });
        }

        async function saveProject(type) {
            const title = document.getElementById(type === 'text' ? 'text-title' : 'map-title').value;
            if(!title) return showToast("Dê um título!", "error");
            const content = type === 'text' ? quill.root.innerHTML : JSON.stringify(jm.get_data());
            const data = { title, content, type, userId: window.currentUser.uid, updatedAt: window.serverTimestamp() };
            if(currentProjectId) await window.updateDoc(window.doc(window.db, "projects", currentProjectId), data);
            else { const ref = await window.addDoc(window.collection(window.db, "projects"), data); currentProjectId = ref.id; }
            showToast("Salvo!"); loadProjects();
        }

        async function openProject(id, type) {
            currentProjectId = id;
            const docSnap = await window.getDoc(window.doc(window.db, "projects", id));
            const p = docSnap.data();
            if(type === 'text') { document.getElementById('text-title').value = p.title; quill.root.innerHTML = p.content; showView('text-editor'); }
            else { document.getElementById('map-title').value = p.title; initJsMind(JSON.parse(p.content)); showView('map-editor'); }
        }

        function createNewProject(type) {
            currentProjectId = null;
            if(type === 'text') { document.getElementById('text-title').value = ''; quill.root.innerHTML = ''; showView('text-editor'); }
            else { document.getElementById('map-title').value = ''; initJsMind(null); showView('map-editor'); }
        }

        function initJsMind(data) {
            const mind = data || { "meta": { "name": "novo" }, "format": "node_array", "data": [{ "id": "root", "isroot": true, "topic": "Ideia Central" }] };
            if (jm) jm.show(mind); else jm = jsMind.show({ container: 'jsmind_container', editable: true, theme: 'primary' }, mind);
        }

        function addMapNode() { const s = jm.get_selected_node(); if(s) jm.add_node(s, jsMind.util.uuid.newid(), 'Novo Tópico'); }

        function deleteSavedProject(id) {
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-modal').classList.add('flex');
            document.getElementById('confirm-btn').onclick = async () => {
                await window.deleteDoc(window.doc(window.db, "projects", id));
                closeConfirm(); loadProjects(); showToast("Excluído");
            };
        }

        function closeConfirm() { document.getElementById('confirm-modal').classList.add('hidden'); }
        function showToast(m, t='success') {
            const el = document.getElementById('toast');
            el.innerHTML = m; el.className = `fixed bottom-4 right-4 z-50 px-6 py-3 rounded-xl shadow-xl text-white font-bold transition-all ${t === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            el.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => el.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
