<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteHub Pro - Seu Segundo Cérebro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { 
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' }, 
                        dark: '#0f172a' 
                    } 
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        #editor-container { height: calc(100vh - 250px); font-size: 16px; border-radius: 0 0 1rem 1rem; }
        .ql-toolbar { border-radius: 1rem 1rem 0 0 !important; background: #f8fafc; border-color: #e2e8f0 !important; }
        
        #jsmind_container { 
            width: 100%; height: calc(100vh - 250px); 
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px);
            background-size: 25px 25px;
            border-radius: 1rem; 
            cursor: grab;
            overflow: hidden; 
            border: 1px solid #e2e8f0;
        }
        #jsmind_container:active { cursor: grabbing; }
        jmnode img { border-radius: 6px; margin-top: 5px; display: block; max-width: 150px; }

        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyC08uBaH3okS0pdOkMM9wWS2c_sTt6_UTU",
            authDomain: "bloco-de-notas-85103.firebaseapp.com",
            projectId: "bloco-de-notas-85103",
            storageBucket: "bloco-de-notas-85103.firebasestorage.app",
            messagingSenderId: "890697512853",
            appId: "1:890697512853:web:7bff196880f1b010d5289c",
            measurementId: "G-SKDH1JR99T"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Expondo para o escopo global
        window.db = db; window.auth = auth;
        window.collection = collection; window.addDoc = addDoc; window.getDocs = getDocs;
        window.doc = doc; window.updateDoc = updateDoc; window.deleteDoc = deleteDoc;
        window.query = query; window.where = where; window.serverTimestamp = serverTimestamp;
        window.orderBy = orderBy;

        window.loginGoogle = () => { signInWithPopup(auth, provider).catch(err => alert(err.message)); };
        window.logout = () => { signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('flex');
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
                showView('dashboard');
                loadProjects();
            } else {
                window.currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white rounded-2xl p-8 w-96 shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-2">Aviso</h3>
            <p id="modal-message" class="text-slate-600 mb-6"></p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel" class="hidden px-5 py-2 text-slate-500 hover:bg-slate-100 rounded-xl">Cancelar</button>
                <button id="modal-confirm" class="bg-brand-500 text-white px-6 py-2 rounded-xl font-medium">OK</button>
            </div>
        </div>
    </div>

    <div id="auth-screen" class="min-h-screen flex flex-col">
        <div class="flex-grow flex items-center justify-center p-4">
            <div class="bg-white rounded-[2.5rem] shadow-2xl flex overflow-hidden max-w-5xl w-full h-[600px] border border-slate-100">
                <div class="hidden md:block w-1/2 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1497032628192-86f99bcd76bc?q=80&w=1000&auto=format&fit=crop');">
                    <div class="h-full w-full bg-brand-600/20 backdrop-brightness-75 flex flex-col justify-end p-12">
                        <h2 class="text-white text-4xl font-bold">Organize sua mente.</h2>
                        <p class="text-white/90 mt-2 text-lg">Simples, visual e sempre com você.</p>
                    </div>
                </div>
                <div class="w-full md:w-1/2 p-12 flex flex-col justify-center items-center text-center">
                    <div class="text-brand-500 text-5xl mb-6"><i class="fa-solid fa-layer-group"></i></div>
                    <h1 class="text-4xl font-extrabold text-dark mb-4">NoteHub <span class="text-brand-500">Pro</span></h1>
                    <p class="text-slate-500 mb-10">Acesse suas notas e mapas mentais de qualquer lugar.</p>
                    <button onclick="loginGoogle()" class="w-full max-w-xs flex items-center justify-center gap-3 bg-slate-900 text-white px-6 py-4 rounded-2xl hover:bg-brand-600 transition-all font-semibold shadow-xl">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6 bg-white rounded-full p-1">
                        Entrar com Google
                    </button>
                </div>
            </div>
        </div>
        <footer class="py-6 text-center text-slate-400 text-sm">
            &copy; 2026 NoteHub Pro &bull; Sua produtividade em primeiro lugar.
        </footer>
    </div>

    <div id="main-app" class="hidden min-h-screen">
        <aside class="w-72 bg-dark text-slate-300 p-6 flex flex-col shadow-xl">
            <div class="flex items-center gap-3 mb-12 px-2">
                <i class="fa-solid fa-note-sticky text-brand-500 text-3xl"></i>
                <span class="text-2xl font-bold text-white tracking-tight">NoteHub</span>
            </div>
            
            <nav class="flex-grow space-y-2">
                <button onclick="showView('dashboard')" class="w-full flex items-center gap-4 bg-slate-800 text-white px-4 py-3.5 rounded-2xl font-medium text-left transition-all border border-slate-700">
                    <i class="fa-solid fa-house-chimney w-5"></i> Meu Hub
                </button>
            </nav>

            <div class="mt-auto p-4 bg-slate-800/50 rounded-2xl border border-slate-700 flex items-center gap-3">
                <img id="user-photo" class="h-10 w-10 rounded-full ring-2 ring-brand-500">
                <div class="flex-1 overflow-hidden">
                    <p id="user-name" class="text-sm font-bold text-white truncate"></p>
                    <button onclick="logout()" class="text-xs text-red-400 font-semibold">Sair</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="bg-white border-b border-slate-200 p-6 flex items-center justify-between">
                <h2 id="header-title" class="text-2xl font-bold text-slate-800">Meu Hub</h2>
            </header>

            <div class="flex-1 p-8 overflow-y-auto">
                
                <div id="view-dashboard" class="view-section block max-w-6xl mx-auto">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <button onclick="createNewProject('text')" class="group p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-brand-500 transition-all text-left">
                            <div class="w-14 h-14 bg-brand-50 text-brand-500 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-brand-500 group-hover:text-white transition-colors mb-4">
                                <i class="fa-solid fa-file-lines"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800">Novo Texto</h3>
                            <p class="text-slate-500">Crie anotações, roteiros ou diários.</p>
                        </button>
                        <button onclick="createNewProject('map')" class="group p-8 bg-white border-2 border-dashed border-slate-200 rounded-[2rem] hover:border-purple-500 transition-all text-left">
                            <div class="w-14 h-14 bg-purple-50 text-purple-500 rounded-2xl flex items-center justify-center text-2xl group-hover:bg-purple-500 group-hover:text-white transition-colors mb-4">
                                <i class="fa-solid fa-diagram-project"></i>
                            </div>
                            <h3 class="text-xl font-bold text-slate-800">Novo Mapa Mental</h3>
                            <p class="text-slate-500">Organize ideias visualmente.</p>
                        </button>
                    </div>

                    <h3 class="text-lg font-bold text-slate-700 mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-folder-open text-brand-500"></i> Seus Projetos
                    </h3>
                    <div id="projects-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        </div>
                </div>

                <div id="view-text-editor" class="view-section hidden flex-col h-full max-w-5xl mx-auto">
                    <div class="flex justify-between items-center mb-6 gap-4">
                        <input type="text" id="text-title" placeholder="Título do Documento" class="bg-transparent text-3xl font-bold outline-none flex-1">
                        <div class="flex gap-2">
                            <button onclick="saveProject('text')" class="bg-brand-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-brand-500/30">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-200 px-6 py-2 rounded-xl font-bold">Voltar</button>
                        </div>
                    </div>
                    <div id="editor-container" class="bg-white shadow-xl"></div>
                </div>

                <div id="view-map-editor" class="view-section hidden flex-col h-full">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                        <input type="text" id="map-title" placeholder="Título do Mapa" class="bg-transparent text-3xl font-bold outline-none flex-1">
                        <div class="flex items-center gap-2 bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                            <input type="color" id="node-color" class="w-8 h-8 rounded cursor-pointer border-none bg-transparent">
                            <button onclick="changeNodeColor()" class="p-2 hover:bg-slate-100 rounded-lg" title="Pintar Nó"><i class="fa-solid fa-fill-drip"></i></button>
                            <button onclick="addNodeImage()" class="p-2 hover:bg-slate-100 rounded-lg" title="Adicionar Imagem"><i class="fa-solid fa-image"></i></button>
                            <div class="w-px h-6 bg-slate-200 mx-2"></div>
                            <button onclick="addMapNode()" class="bg-dark text-white px-4 py-2 rounded-xl text-sm font-bold"> + Tópico</button>
                            <button onclick="saveProject('map')" class="bg-brand-500 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-brand-500/30">Salvar</button>
                            <button onclick="showView('dashboard')" class="bg-slate-200 px-4 py-2 rounded-xl font-bold">Sair</button>
                        </div>
                    </div>
                    <div id="jsmind_container" class="shadow-xl"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>

    <script>
        let currentProjectId = null;
        let jm = null;
        const quill = new Quill('#editor-container', { theme: 'snow', placeholder: 'Escreva algo incrível...' });

        // NAVEGAÇÃO
        function showView(view) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if(view === 'text-editor' || view === 'map-editor') document.getElementById(`view-${view}`).classList.add('flex');
            document.getElementById('header-title').innerText = view === 'dashboard' ? 'Meu Hub' : (view === 'text-editor' ? 'Editor de Texto' : 'Mapa Mental');
        }

        // FIREBASE: CARREGAR PROJETOS NO HUB
        async function loadProjects() {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = '<p class="text-slate-400">Carregando seus projetos...</p>';
            
            try {
                const q = window.query(
                    window.collection(window.db, "projects"), 
                    window.where("userId", "==", window.currentUser.uid),
                    window.orderBy("updatedAt", "desc")
                );
                const snap = await window.getDocs(q);
                grid.innerHTML = '';

                if (snap.empty) {
                    grid.innerHTML = '<p class="col-span-full text-slate-400 italic">Você ainda não tem projetos salvos.</p>';
                    return;
                }

                snap.forEach(docSnap => {
                    const p = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer group";
                    card.innerHTML = `
                        <div onclick="openProject('${docSnap.id}', '${p.type}')">
                            <div class="flex justify-between items-start mb-4">
                                <div class="w-10 h-10 ${p.type === 'text' ? 'bg-blue-50 text-blue-500' : 'bg-purple-50 text-purple-500'} rounded-xl flex items-center justify-center">
                                    <i class="fa-solid ${p.type === 'text' ? 'fa-file-lines' : 'fa-diagram-project'}"></i>
                                </div>
                                <button onclick="event.stopPropagation(); deleteSavedProject('${docSnap.id}')" class="text-slate-300 hover:text-red-500 transition-colors">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                            <h4 class="font-bold text-slate-800 text-lg mb-1 truncate">${p.title}</h4>
                            <p class="text-xs text-slate-400 uppercase font-bold tracking-widest">${p.type === 'text' ? 'Documento' : 'Mapa Mental'}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        // FIREBASE: SALVAR PROJETO
        async function saveProject(type) {
            const title = document.getElementById(type === 'text' ? 'text-title' : 'map-title').value;
            const content = type === 'text' ? quill.root.innerHTML : JSON.stringify(jm.get_data());

            if (!title.trim()) return alert("Dê um título ao projeto!");

            const data = {
                title, content, type,
                userId: window.currentUser.uid,
                updatedAt: window.serverTimestamp()
            };

            try {
                if (currentProjectId) {
                    await window.updateDoc(window.doc(window.db, "projects", currentProjectId), data);
                } else {
                    const docRef = await window.addDoc(window.collection(window.db, "projects"), data);
                    currentProjectId = docRef.id;
                }
                alert("Salvo com sucesso!");
                loadProjects();
            } catch (e) { alert("Erro ao salvar!"); }
        }

        // ABRIR PROJETO
        async function openProject(id, type) {
            currentProjectId = id;
            // Busca os dados nos documentos carregados (simplificado para o exemplo)
            const q = window.query(window.collection(window.db, "projects"));
            const snap = await window.getDocs(q);
            const p = snap.docs.find(d => d.id === id).data();

            if (type === 'text') {
                document.getElementById('text-title').value = p.title;
                quill.root.innerHTML = p.content;
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = p.title;
                initJsMind(JSON.parse(p.content));
                showView('map-editor');
            }
        }

        // EXCLUIR
        async function deleteSavedProject(id) {
            if (confirm("Deseja realmente excluir este projeto?")) {
                await window.deleteDoc(window.doc(window.db, "projects", id));
                loadProjects();
            }
        }

        function createNewProject(type) {
            currentProjectId = null;
            if (type === 'text') {
                document.getElementById('text-title').value = '';
                quill.root.innerHTML = '';
                showView('text-editor');
            } else {
                document.getElementById('map-title').value = '';
                initJsMind(null);
                showView('map-editor');
            }
        }

        // JSMIND LOGIC
        function initJsMind(data) {
            const mind = data || { "meta": { "name": "novo" }, "format": "node_array", "data": [{ "id": "root", "isroot": true, "topic": "Ideia Central" }] };
            if (jm) jm.show(mind);
            else jm = jsMind.show({ container: 'jsmind_container', editable: true, theme: 'primary' }, mind);
        }

        function addMapNode() {
            const selected = jm.get_selected_node();
            if (selected) jm.add_node(selected, jsMind.util.uuid.newid(), 'Novo Tópico');
            else alert("Selecione um tópico pai!");
        }

        function changeNodeColor() {
            const node = jm.get_selected_node();
            const color = document.getElementById('node-color').value;
            if (node) jm.set_node_color(node.id, color, '#ffffff');
        }

        function addNodeImage() {
            const node = jm.get_selected_node();
            if (!node) return alert("Selecione um tópico!");
            const url = prompt("URL da Imagem:");
            if (url) jm.update_node(node.id, node.topic + `<br><img src="${url}">`);
        }

        // DRAG TO PAN (ARRASte do Mapa)
        const container = document.getElementById('jsmind_container');
        let isDown = false, startX, startY, scrollLeft, scrollTop;
        container.addEventListener('mousedown', (e) => {
            if (e.target.closest('jmnode')) return;
            isDown = true; startX = e.pageX - container.offsetLeft; startY = e.pageY - container.offsetTop;
            scrollLeft = container.scrollLeft; scrollTop = container.scrollTop;
        });
        container.addEventListener('mouseup', () => isDown = false);
        container.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            container.scrollLeft = scrollLeft - (e.pageX - container.offsetLeft - startX) * 1.5;
            container.scrollTop = scrollTop - (e.pageY - container.offsetTop - startY) * 1.5;
        });
    </script>
</body>
</html>
